spring:
  cloud:
    config:
      uri: http://external-configuration:8888
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 1000

eureka:
  client:
    service-url:
      defaultZone: http://service-discovery:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: api-gateway:${server.port}